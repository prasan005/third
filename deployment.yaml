---
apiVersion: apps/v1
kind: Deployment
metadata: 
  name: flm
spec:
  replicas: 2
  selector: 
    matchLabels:
      app: swiggy
  template:
    metadata:
      labels:
        app: swiggy
    spec:
      containers:
        - name: cont1
          image: shaikmustafa/cycle
          ports:
            - containerPort: 80
